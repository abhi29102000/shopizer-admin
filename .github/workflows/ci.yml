name: CI

on:
  push:
    branches: ['**']

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '12'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install font-awesome
          npm install @types/jquery@3.5.5 @types/ws@7.4.7 @types/minimatch@3.0.5 angular-file@3.1.2

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build Docker image
        run: docker build -t shopizer-admin:${{ github.sha }} .
